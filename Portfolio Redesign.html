<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Linda Mansour — Portfolio Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Source+Serif+4:ital,wght@0,400;0,500;0,600;1,400&family=Fraunces:ital,wght@0,300;0,400;0,500;1,300;1,400&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f4ede0; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="direction-a.jsx"></script>
<script type="text/babel" src="direction-a-2.jsx"></script>
<script type="text/babel" src="direction-b.jsx"></script>
<script type="text/babel" src="direction-b-2.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  return (
    <DesignCanvas title="Portfolio Redesign — two directions" subtitle="Direction A: Editorial Field Journal · Direction B: Quiet Terminal">
      <DCSection id="dir-a" title="Direction A — Editorial Field Journal" subtitle="Warm cream paper · brown ink · muted sage + clay accents · all serif">
        <DCArtboard id="a-home" label="A · Home" width={1440} height={1800}><A_Home /></DCArtboard>
        <DCArtboard id="a-projects" label="A · Projects" width={1440} height={1800}><A_Projects /></DCArtboard>
        <DCArtboard id="a-research" label="A · Research" width={1440} height={1800}><A_Research /></DCArtboard>
        <DCArtboard id="a-about" label="A · About" width={1440} height={1800}><A_About /></DCArtboard>
      </DCSection>

      <DCSection id="dir-b" title="Direction B — Quiet Terminal" subtitle="Warm dark · cream foreground · Fraunces serif + JetBrains Mono · taped photos">
        <DCArtboard id="b-home" label="B · Home" width={1440} height={1800}><B_Home /></DCArtboard>
        <DCArtboard id="b-projects" label="B · Projects" width={1440} height={1800}><B_Projects /></DCArtboard>
        <DCArtboard id="b-research" label="B · Research" width={1440} height={1800}><B_Research /></DCArtboard>
        <DCArtboard id="b-about" label="B · About" width={1440} height={1800}><B_About /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
